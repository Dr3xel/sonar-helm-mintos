name: Validation 

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  validate:
    name: Validate Helm charts and Terraform
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.10.0

      - name: Install kubeconform
        run: |
          curl -sSL -o kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz

          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform

          kubeconform -v

      - name: Terraform format check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: terraform
        run: terraform validate

      - name: Helm lint PostgreSQL chart
        run: helm lint helm/postgresql

      - name: Helm lint SonarQube chart
        run: helm lint helm/sonarqube

      - name: Render PostgreSQL chart
        run: |
          mkdir -p rendered

          helm template postgresql helm/postgresql \
            --namespace sonarqube \
            > rendered/postgresql.yaml

      - name: Render SonarQube chart
        run: |
          helm template sonarqube helm/sonarqube \
            --namespace sonarqube \
            > rendered/sonarqube.yaml

      - name: Validate rendered Kubernetes manifests
        run: |
          kubeconform \
            -strict \
            -summary \
            rendered/postgresql.yaml \
            rendered/sonarqube.yaml